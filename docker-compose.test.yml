# Test-only Docker Compose: isolated Neo4j instance for integration tests.
# No application services — test infra only.
#
# Ports (host:container):
#   Bolt  7688:7687   (avoids collision with the dev instance on 7687)
#   HTTP  7475:7474   (avoids collision with the dev instance on 7474)
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   NEO4J_TEST_URI=bolt://localhost:7688 pytest -q app/tests/integration/

services:
  neo4j-test:
    image: neo4j:5
    container_name: neo4j-test
    ports:
      - "7688:7687"
      - "7475:7474"
    environment:
      NEO4J_AUTH: none
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
